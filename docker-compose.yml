version: '3.9'
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: capstone-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capstone-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
      - CORS_ALLOW_ORIGINS=http://localhost:3000,http://frontend:3000
      - CREATEAI_API_TOKEN=${CREATEAI_API_TOKEN}
      - CREATEAI_API_URL=${CREATEAI_API_URL}
      - CREATEAI_PROJECT_ID=${CREATEAI_PROJECT_ID:-}
      - CREATEAI_MODEL_PROVIDER=${CREATEAI_MODEL_PROVIDER:-openai}
      - CREATEAI_MODEL_NAME=${CREATEAI_MODEL_NAME:-gpt4}
      # Optional: lighter model for POST /fetch/quiz only (tutor uses CREATEAI_MODEL_* via /fetch/query)
      - CREATEAI_QUIZ_MODEL_PROVIDER=${CREATEAI_QUIZ_MODEL_PROVIDER:-}
      - CREATEAI_QUIZ_MODEL_NAME=${CREATEAI_QUIZ_MODEL_NAME:-}
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - PINECONE_INDEX=${PINECONE_INDEX:-}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT:-}
      - PINECONE_HOST=${PINECONE_HOST:-}
      - LOCAL_EMBEDDING_MODEL=${LOCAL_EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
      - LOCAL_EMBEDDING_DIM=${LOCAL_EMBEDDING_DIM:-384}
    volumes:
      - "./Knowledge Base:/app/knowledge-base:ro"
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: capstone-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:


